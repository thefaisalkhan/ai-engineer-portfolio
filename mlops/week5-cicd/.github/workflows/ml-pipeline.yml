name: ML Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  MODEL_PERFORMANCE_THRESHOLD: "0.85"   # AUC-ROC minimum to pass validation

jobs:
  # ─── Job 1: Code Quality ──────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev deps
        run: pip install ruff mypy types-requests

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Type check
        run: mypy . --ignore-missing-imports --strict

  # ─── Job 2: Tests ─────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # ─── Job 3: Model Validation ──────────────────────────────────────────────
  model-validation:
    name: Validate Model Performance
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt scikit-learn pandas

      - name: Train and validate model
        run: python scripts/validate_model.py --threshold ${{ env.MODEL_PERFORMANCE_THRESHOLD }}

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model.joblib
          retention-days: 30

      - name: Comment metrics on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metrics = JSON.parse(fs.readFileSync('model_metrics.json', 'utf8'));
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Model Validation Results\n\n| Metric | Value |\n|--------|-------|\n| AUC-ROC | ${metrics.auc.toFixed(4)} |\n| CV AUC | ${metrics.cv_auc.toFixed(4)} |\n| Status | ${metrics.passed ? '✅ PASSED' : '❌ FAILED'} |`
            })

  # ─── Job 4: Build Docker Image ────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: model-validation
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 5: Deploy to Staging ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.myaiapp.com
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.build-image.outputs.image-tag }} to staging"
          # kubectl set image deployment/ml-service ml-service=${{ needs.build-image.outputs.image-tag }}
          # kubectl rollout status deployment/ml-service --timeout=300s

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.myaiapp.com/health
          # pytest tests/smoke/ -v

      - name: Notify Slack
        if: always()
        run: |
          echo "Notifying Slack of deployment status"

  # ─── Job 6: Deploy to Production (Manual Approval) ────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://myaiapp.com
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production with zero downtime (rolling update)"
          # kubectl set image deployment/ml-service ml-service=${{ needs.build-image.outputs.image-tag }}
          # kubectl rollout status deployment/ml-service --timeout=600s

      - name: Verify production health
        run: |
          echo "Verifying production health..."
          # for i in 1 2 3 4 5; do
          #   curl -f https://myaiapp.com/health && break || sleep 10
          # done

  # ─── Job 7: Rollback on Failure ────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    steps:
      - name: Rollback deployment
        run: |
          echo "ALERT: Production deployment failed — rolling back"
          # kubectl rollout undo deployment/ml-service
          # kubectl rollout status deployment/ml-service
